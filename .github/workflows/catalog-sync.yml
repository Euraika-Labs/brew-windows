name: Catalog Sync

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync Homebrew Windows candidates
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true

      - name: Generate Windows catalog candidates
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./v1/scripts/sync-homebrew-catalog.ps1 `
            -Limit 200 `
            -GenerateManifests `
            -FailOnNoCandidates

      - name: Validate generated catalog
        shell: pwsh
        run: ./v1/scripts/validate.ps1

      - name: Create or update catalog sync pull request
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.CATALOG_SYNC_PR_TOKEN || github.token }}
        run: |
          if (-not (git status --short)) {
            Write-Host "No catalog changes."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B automation/catalog-sync
          git add v1/catalog v1/Library/Taps/euraika-labs/homebrew-core/Formula/Generated
          git commit -m "Sync Windows-compatible Homebrew catalog"
          git fetch origin automation/catalog-sync --depth=1 2>$null
          git push --force-with-lease origin HEAD:automation/catalog-sync

          $existing = gh pr list --head automation/catalog-sync --state open --json number --jq ".[0].number"
          if ([string]::IsNullOrWhiteSpace($existing)) {
            gh pr create `
              --title "Sync Windows-compatible Homebrew catalog" `
              --body "Automated update from Homebrew formula metadata and verified Windows GitHub release assets." `
              --base main `
              --head automation/catalog-sync
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Catalog branch was pushed, but GitHub refused automatic PR creation."
              Write-Warning "Enable 'Allow GitHub Actions to create and approve pull requests' or add a CATALOG_SYNC_PR_TOKEN secret."
              @(
                "### Catalog sync branch pushed",
                "",
                "The generated catalog changes were pushed to ``automation/catalog-sync``, but this repository does not currently allow the workflow token to create pull requests.",
                "",
                "Open the PR manually from:",
                "",
                "https://github.com/${{ github.repository }}/pull/new/automation/catalog-sync",
                "",
                "To make this fully automatic, enable **Allow GitHub Actions to create and approve pull requests** in repository Actions settings, or provide a ``CATALOG_SYNC_PR_TOKEN`` secret with pull request permissions."
              ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
              exit 0
            }
          } else {
            gh pr edit $existing `
              --title "Sync Windows-compatible Homebrew catalog" `
              --body "Automated update from Homebrew formula metadata and verified Windows GitHub release assets."
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Catalog branch was pushed, but GitHub refused automatic PR update for #$existing."
              @(
                "### Catalog sync branch pushed",
                "",
                "The generated catalog changes were pushed to ``automation/catalog-sync``, but the workflow could not update pull request #$existing.",
                "",
                "Review the pushed branch manually, or provide a ``CATALOG_SYNC_PR_TOKEN`` secret with pull request permissions."
              ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
              exit 0
            }
          }
