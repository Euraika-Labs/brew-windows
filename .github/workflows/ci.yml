name: CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  powershell:
    name: PowerShell (${{ matrix.shell }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shell:
          - pwsh
          - powershell
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Brew Windows tests
        shell: ${{ matrix.shell }}
        run: ./tests/run.ps1

  script-analyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Analyze PowerShell scripts
        shell: pwsh
        run: |
          $paths = @("bin", "install.ps1", "uninstall.ps1", "tests")
          $results = Invoke-ScriptAnalyzer -Path $paths -Recurse -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

  manifest:
    name: Manifest JSON
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate JSON files parse
        shell: pwsh
        run: |
          git ls-files --cached --others --exclude-standard -- "*.json" | ForEach-Object {
            Write-Host "Parsing $_"
            Get-Content -LiteralPath $_ -Raw | ConvertFrom-Json | Out-Null
          }
