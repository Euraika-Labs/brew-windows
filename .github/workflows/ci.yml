name: CI

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  powershell-7:
    name: PowerShell 7
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run validation
        shell: pwsh
        run: ./scripts/validate.ps1

  windows-powershell:
    name: Windows PowerShell
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run validation
        shell: powershell
        run: ./scripts/validate.ps1

  script-analyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Analyze PowerShell scripts
        shell: pwsh
        run: |
          $paths = @("bin", "install.ps1", "uninstall.ps1", "scripts", "tests")
          $results = foreach ($path in $paths) {
            Invoke-ScriptAnalyzer -Path $path -Recurse -Severity Error
          }
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

  manifest:
    name: Manifest JSON
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate JSON files parse
        shell: pwsh
        run: |
          git ls-files --cached --others --exclude-standard -- "*.json" | ForEach-Object {
            Write-Host "Parsing $_"
            Get-Content -LiteralPath $_ -Raw | ConvertFrom-Json | Out-Null
          }
